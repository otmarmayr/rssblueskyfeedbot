name: Bluesky Feed Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run feed bot
        run: node index.js

      - name: Cache Bluesky state
        uses: actions/cache@v4
        with:
          path: .cache
          key: bluesky-cache-${{ github.run_id }}
          restore-keys: bluesky-cache-
