name: Bluesky Persönlichkeiten Bot – prüft alle 10 Minuten auf neue Einträge

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run Bot
        env:
          FEED_URLS: ${{ secrets.FEED_URLS_PERS }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          STATE_FILE: ".lastpost_pers.json"
        run: node index.js

      - name: Commit updated state
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .lastpost_pers.json
          git commit -m "Update pers state" || echo "No changes to commit"
          git push
